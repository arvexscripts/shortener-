<script>
document.addEventListener("DOMContentLoaded", () => {

let current = 0;
let btns = document.querySelectorAll(".btn");
let rodando = false;

function start(i){
    if(i !== current || rodando) return;

    rodando = true;

    let tempo = 15;
    btns[i].innerText = "Aguarde " + tempo + "s";

    let intervalo = setInterval(() => {
        tempo--;
        btns[i].innerText = "Aguarde " + tempo + "s";

        if(tempo <= 0){
            clearInterval(intervalo);
            concluir();
            rodando = false;
        }
    }, 1000);
}

function concluir(){
    btns[current].innerText = "Concluído";
    btns[current].classList.add("done");

    current++;

    if(btns[current]){
        btns[current].classList.remove("blocked");
    }

    let status = document.getElementById("status");
    if(status){
        status.innerText = "Etapa " + (current+1) + " de 3";
    }

    if(current === 3){
        let u = document.getElementById("unlock");
        if(u){
            u.style.display = "block";

            u.onclick = () => {
                window.location.href = "https://SEULINKAQUI.com";
            };
        }
    }
}

});
</script>
